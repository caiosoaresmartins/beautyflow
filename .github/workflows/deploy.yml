name: Deploy -> Render

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    env:
      RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_DEPLOY_HOOK }}

    steps:
      - name: Trigger Render deploy hook
        if: ${{ env.RENDER_DEPLOY_HOOK != '' }}
        run: |
          curl -s -X POST "$RENDER_DEPLOY_HOOK" \
            -H 'Content-Type: application/json' \
            --fail --show-error

      - name: Skip deploy (RENDER_DEPLOY_HOOK not configured)
        if: ${{ env.RENDER_DEPLOY_HOOK == '' }}
        run: echo "RENDER_DEPLOY_HOOK secret nao configurado - deploy pulado. Configure em Render Dashboard."
