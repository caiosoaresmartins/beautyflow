name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: beautyflow
          POSTGRES_PASSWORD: beautyflow
          POSTGRES_DB: beautyflow_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://beautyflow:beautyflow@localhost:5432/beautyflow_test
      JWT_SECRET: ci-secret-only
      NODE_ENV: test
      AES_SECRET_KEY: ci-aes-secret-key-for-tests-only
      REDIS_URL: ""
      META_ACCESS_TOKEN: ""
      META_VERIFY_TOKEN: ""
      META_APP_SECRET: ""
      OPENAI_API_KEY: ""
      ASAAS_API_KEY: ""

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma migrate deploy

      - name: TypeScript build check
        run: npm run build

      - name: Run tests
        run: npm test -- --passWithNoTests --forceExit

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    needs: build-and-test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t beautyflow:ci .
